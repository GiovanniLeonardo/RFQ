<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 550px; }
        h2 { color: #003057; border-bottom: 2px solid #005696; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: #005696; color: white; border: none; padding: 15px; border-radius: 6px; margin-top: 30px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #003057; }
        .success { display: none; text-align: center; color: #27ae60; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Network Quote Intake</h2>
        <form id="teamForm">
            <label>Project ID</label>
            <input type="text" id="project" required>
            
            <label>Site Address</label>
            <input type="text" id="address" required>
            
            <label>Bandwidth Requirement</label>
            <input type="text" id="bw" placeholder="e.g. 1Gbps" required>
            
            <label>Service Type</label>
            <select id="svc">
                <option value="DIA">DIA</option>
                <option value="Broadband">Broadband</option>
                <option value="P2P">Point-to-Point</option>
               
            </select>
            
            <label>Hand-off Type</label>
            <input type="text" id="ho" placeholder="e.g. Fiber LC" required>

            <label>Supplier Contact Emails (Comma separated)</label>
            <input type="text" id="emails" placeholder="sales@att.com, sales@verizon.com">

            <button type="submit" id="submitBtn">Create Project & Notify Suppliers</button>
        </form>
        <div id="success" class="success">Project Created & Suppliers Queued!</div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxMneKnfbbeIfxYXcXtzAHZfYNg78_BgUAcubaihDe26IfAtC2lJm1LisLI7c6ocrc2/exec"; // Use your same Web App URL

        document.getElementById('teamForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const data = {
                action: "teamIntake",
                project: document.getElementById('project').value,
                address: document.getElementById('address').value,
                bw: document.getElementById('bw').value,
                svc: document.getElementById('svc').value,
                ho: document.getElementById('ho').value,
                emails: document.getElementById('emails').value
            };

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            }).then(() => {
                document.getElementById('teamForm').style.display = 'none';
                document.getElementById('success').style.display = 'block';
            });
        });
    </script>
</body>
</html>
